{% extends 'base.html' %}

{% block titulo %}
    <h1>Criar Livro</h1>
{% endblock %}

{% block conteudo %}

<h2>Cadastrar Novo Livro</h2>
<form action="/biblioteca/atualizar/{{livro.isbn}}" method="POST">
    <label>ISBN: <input type="text" name="isbn" value="{{livro.isbn}}" readonly></label><br>
    <label>Título: <input type="text" name="titulo" value="{{livro.titulo}}" required></label><br>
    <label>Autor: <input type="text" name="autor" value="{{livro.autor}}" required></label><br>
    <label>Genero: <input type="text" name="genero" value="{{livro.genero}}" required> </label><br>
    <label>Ano Publicacao: <input type="text" name="ano_publicacao" value="{{livro.ano_publicacao}}" required> </label><br>
    <label>Editora: <input type="text" name="editora" value="{{livro.editora}}" required> </label><br>
    <label>Paginas: <input type="text" name="paginas" value="{{livro.paginas}}" required> </label><br>
    <label>Status: <input type="text" name="status" value="{{livro.status}}" required> </label><br>
    <label>Localizacao: <input type="text" name="localizacao" value="{{livro.localizacao}}" required> </label>

    <button type="submit">Editar Livro</button>
</form>

{% endblock %}
